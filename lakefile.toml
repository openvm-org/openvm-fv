name = "openvm-fv"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["OpenvmFv"]
moreLeanArgs = ["--tstack=400000"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
# weak.linter.mathlibStandardSet = true
# maxSynthPendingDepth = 3
# linter.hashCommand = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.26.0"

[[require]]
name = "LeanZKCircuit"
git = "https://github.com/NethermindEth/leanzkcircuit.git"
rev = "v4.26.0"

[[require]]
name = "LeanRV"
git = "https://github.com/NethermindEth/sail-riscv-lean"
rev = "rv32d"

[[lean_lib]]
name = "OpenvmFv"
