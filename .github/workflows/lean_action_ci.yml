name: Lean Action CI

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hygiene:
    name: Hygiene scan (no native_decide / bv_decide / sorry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zero-tolerance forbidden-tactic / proof-hole scan
        run: python3 scripts/check_hygiene.py

  build-openvm-fv:
    name: Build OpenvmFv
    runs-on:
      - runs-on=${{ github.run_id }}/volume=80gb/runner=64cpu-linux-x64/image=ubuntu24-full-x64/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
      - uses: actions/checkout@v4

      - name: Restore .lake cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: .lake
          key: lake-openvm-fv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-openvm-fv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-

      - name: Build OpenvmFv
        uses: leanprover/lean-action@v1
        with:
          build: true
          build-args: "OpenvmFv"
          use-mathlib-cache: "true"
          use-github-cache: "false"

      - name: Save .lake cache
        if: always() && steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .lake
          key: lake-openvm-fv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}

  build-vm-extensions:
    name: Build VmExtensions
    runs-on:
      - runs-on=${{ github.run_id }}/volume=80gb/runner=64cpu-linux-x64/image=ubuntu24-full-x64/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
      - uses: actions/checkout@v4

      - name: Restore .lake cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            .lake
            VmExtensions/.lake
          key: lake-vm-extensions-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'VmExtensions/lean-toolchain', 'VmExtensions/lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-vm-extensions-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'VmExtensions/lean-toolchain', 'VmExtensions/lake-manifest.json') }}-

      - name: Build VmExtensions
        uses: leanprover/lean-action@v1
        with:
          build: true
          build-args: "VmExtensions"
          lake-package-directory: "VmExtensions"
          use-mathlib-cache: "true"
          use-github-cache: "false"

      - name: Axiom-footprint audit (kernel collectAxioms allowlist)
        # Compiles VmExtensions/Audit.lean, which kernel-collects the transitive
        # axiom footprint of the top-level soundness theorems and fails the build
        # if any depends on an axiom outside {propext, Classical.choice,
        # Quot.sound} — notably sorryAx (open holes) or Lean.ofReduceBool /
        # Lean.trustCompiler (native_decide). This is the in-build counterpart of
        # the leanprover/comparator gate (see ci/comparator/).
        working-directory: VmExtensions
        run: lake build VmExtensions.Audit

      - name: Save .lake cache
        if: always() && steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            .lake
            VmExtensions/.lake
          key: lake-vm-extensions-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'VmExtensions/lean-toolchain', 'VmExtensions/lake-manifest.json') }}-${{ github.sha }}

  comparator:
    name: Comparator gate (independent axiom re-check)
    # Runs the external leanprover/comparator tool: it re-exports the frozen
    # Challenge/Solution statements via lean4export and independently certifies,
    # under a Landlock sandbox, that each Solution theorem proves the same
    # statement as its Challenge counterpart, is accepted by the Lean kernel, and
    # depends on no axiom outside {propext, Quot.sound, Classical.choice}. This is
    # the independent-kernel counterpart to the in-build VmExtensions.Audit gate.
    needs: build-vm-extensions
    runs-on:
      - runs-on=${{ github.run_id }}/volume=80gb/runner=64cpu-linux-x64/image=ubuntu24-full-x64/extras=s3-cache

    steps:
      - uses: runs-on/action@v2
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Set up Go (to build landrun from source)
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Restore .lake cache (VmExtensions build tree)
        uses: actions/cache/restore@v5
        with:
          path: |
            .lake
            VmExtensions/.lake
          key: lake-vm-extensions-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'VmExtensions/lean-toolchain', 'VmExtensions/lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-vm-extensions-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'VmExtensions/lean-toolchain', 'VmExtensions/lake-manifest.json') }}-

      - name: Cache comparator toolchain (comparator + lean4export + landrun)
        uses: actions/cache@v5
        with:
          path: ~/.comparator-toolchain
          key: comparator-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/setup_comparator_toolchain.sh', 'lean-toolchain') }}

      - name: Provision comparator toolchain
        run: scripts/setup_comparator_toolchain.sh

      - name: Run comparator gate
        env:
          # Skip the extra systemd-run wrapper (no user session on the runner);
          # comparator still sandboxes the Solution rebuild internally via landrun.
          COMPARATOR_NO_SANDBOX: "1"
        run: scripts/run_comparator.sh
